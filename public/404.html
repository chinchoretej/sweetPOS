<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SweetPOS</title>
    <script>
      // GitHub Pages SPA fallback. Redirects deep links to index.html
      // preserving the original path & query string for React Router.
      (function () {
        var segmentCount = 1; // change to 0 for custom domain
        var l = window.location;
        var pathSegments = l.pathname.split('/').slice(1);
        var basePath = '/' + pathSegments.slice(0, segmentCount).join('/');
        var rest = pathSegments.slice(segmentCount).join('/');
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            basePath +
            '/?p=/' +
            rest +
            (l.search ? '&q=' + l.search.slice(1) : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
